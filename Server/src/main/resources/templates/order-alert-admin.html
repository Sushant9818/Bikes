<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>New Order Alert</title>
  <style>
    body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
    .container { max-width: 600px; margin: 0 auto; padding: 20px; }
    h1 { color: #E60012; }
    table { width: 100%; border-collapse: collapse; margin: 20px 0; }
    th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
    th { background: #f5f5f5; }
    .total { font-weight: bold; font-size: 1.2em; }
  </style>
</head>
<body>
<div class="container">
  <h1>New Paid Order Received</h1>
  <p><strong>Order #</strong><span th:text="${order.id}"></span></p>
  <p><strong>Customer:</strong> <span th:text="${order.customerName}"></span></p>
  <p><strong>Phone:</strong> <span th:text="${order.phone}"></span></p>
  <p><strong>Email:</strong> <span th:text="${order.email}"></span></p>
  <p><strong>Address:</strong> <span th:text="${order.address}"></span></p>

  <h3>Order Items</h3>
  <table>
    <thead>
    <tr>
      <th>Part</th>
      <th>Price</th>
      <th>Qty</th>
      <th>Total</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="item : ${items}">
      <td th:text="${item.partName}"></td>
      <td th:text="${'$' + #numbers.formatDecimal(item.price, 1, 2)}"></td>
      <td th:text="${item.quantity}"></td>
      <td th:text="${'$' + #numbers.formatDecimal(item.price * item.quantity, 1, 2)}"></td>
    </tr>
    </tbody>
  </table>
  <p class="total">Total: $<span th:text="${#numbers.formatDecimal(totalAmount, 1, 2)}"></span></p>
</div>
</body>
</html>
