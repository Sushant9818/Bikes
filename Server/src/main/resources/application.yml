spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  application:
    name: suzuki-bike-management

  # dev profile uses H2 (no PostgreSQL). For PostgreSQL: -Dspring-boot.run.profiles=default
  datasource:
    url: jdbc:postgresql://localhost:5432/suzuki_bike_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USER:}
    password: ${MAIL_PASS:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: ${SERVER_PORT:8082}
  servlet:
    context-path: /api

jwt:
  secret: ${JWT_SECRET:SuzukiBikeManagementSecretKeyForJWTTokenGenerationMustBeAtLeast256Bits}
  expiration-ms: 86400000

stripe:
  secret-key: ${STRIPE_SECRET_KEY:}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
  currency: ${STRIPE_CURRENCY:usd}

twilio:
  account-sid: ${TWILIO_ACCOUNT_SID:}
  auth-token: ${TWILIO_AUTH_TOKEN:}
  verify-service-sid: ${TWILIO_VERIFY_SERVICE_SID:}

app:
  mail-enabled: ${MAIL_ENABLED:false}
  admin-email: ${ADMIN_EMAIL:admin@example.com}
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  mail-from: ${MAIL_FROM:noreply@example.com}